version: "3.9"

services:

  # ── Bancos de dados ─────────────────────────────────────────────────────

  db_dev:
    image: postgres:16-alpine
    container_name: lapzy_db_dev
    environment:
      POSTGRES_USER: lapzy
      POSTGRES_PASSWORD: lapzy
      POSTGRES_DB: lapzy_development
    ports:
      - "5432:5432"
    volumes:
      - lapzy_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lapzy"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:16-alpine
    container_name: lapzy_db_test
    environment:
      POSTGRES_USER: lapzy
      POSTGRES_PASSWORD: lapzy
      POSTGRES_DB: lapzy_test
    ports:
      - "5433:5432"
    volumes:
      - lapzy_pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lapzy"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_staging:
    image: postgres:16-alpine
    container_name: lapzy_db_staging
    environment:
      POSTGRES_USER: lapzy
      POSTGRES_PASSWORD: lapzy
      POSTGRES_DB: lapzy_staging
    ports:
      - "5434:5432"
    volumes:
      - lapzy_pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lapzy"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Aplicação ────────────────────────────────────────────────────────────

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lapzy_app
    ports:
      - "3000:3000"
    env_file:
      - .env.development.local
    depends_on:
      db_dev:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  lapzy_pgdata_dev:
  lapzy_pgdata_test:
  lapzy_pgdata_staging:
